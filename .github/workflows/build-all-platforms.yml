name: build-all-platforms
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  ELECTRON_CACHE: ~/.cache/electron
  ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

jobs:
  # macOS x64 + arm64 in a single job so electron-builder emits ONE merged
  # latest-mac.yml (required for auto-update to work on both architectures).
  macos:
    name: macOS (x64 + arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Package + generate update metadata
        shell: bash
        env:
          # Signing/notarization run only when these secrets are configured.
          # Empty secrets are unset below so unsigned builds still succeed
          # (electron-builder treats an empty CSC_LINK as a bad file path).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$CSC_LINK" ] || unset CSC_LINK CSC_KEY_PASSWORD
          [ -n "$APPLE_ID" ] || unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          npx electron-builder --mac dmg zip --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Package + generate update metadata
        shell: bash
        env:
          # Code signing runs only when these secrets are configured.
          # Empty secrets are unset below so unsigned builds still succeed.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          [ -n "$CSC_LINK" ] || unset CSC_LINK CSC_KEY_PASSWORD
          npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full build-essential rpm
      - name: Install system fpm
        run: sudo gem install --no-document fpm
      - name: Install deps
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Package + generate update metadata
        env:
          USE_SYSTEM_FPM: "true"
        run: npx electron-builder --linux AppImage deb --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  release:
    name: Create GitHub Release
    needs: [macos, windows-x64, linux-x64]
    runs-on: ubuntu-latest
    # Only cut a release for tag pushes (v*.*.*), not manual test runs.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create/Update GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          # Installers + auto-update metadata (latest*.yml) + blockmaps.
          # electron-updater reads latest*.yml from the published release, so the
          # draft must be published for in-app auto-update to pick it up.
          files: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.blockmap
            dist/**/latest*.yml
